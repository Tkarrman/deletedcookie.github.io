<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Max Nafar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0e0e0e;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 40px 20px 20px;
    }

    header img {
      max-width: 700px;
    }

    section {
      padding: 5px 0px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .games {
      display: grid;
      gap: 60px;
    }

    .game-card {
      background: #181818;
      padding: 30px;
      border-radius: 12px;
    }

    .game-card img.promo {
      width: 100%;
      max-width: 600px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .platforms {
      margin-top: 15px;
    }

    .platforms a img {
      height: 45px;
      margin: 10px;
      transition: transform 0.2s ease;
    }

    .platforms a img:hover {
      transform: scale(1.1);
    }

    footer {
      padding: 40px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <img src="DeletedCookie_Logo_TEMP.png" alt="Deleted Cookie Logo">
  </header>


    <div class="platforms">
        <a href="https://discord.gg/tKzv3DNc93" target="_blank">
            <img src="Discord-Symbol-Blurple.svg" alt="Discord">
        </a>
    </div>

    <footer>
        © 2026 Deleted Cookie <br>
        An independent studio founded by Tobias Kärrman & Max Nafar
    </footer>

</body>
</html>
